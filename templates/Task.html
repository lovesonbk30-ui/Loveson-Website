{% extends 'Base.html' %}
      {% block body %}
    <style>
  
    /* --- CSS Variables for Easy Customization --- */
:root {
    --bg-dark: #121214;
    --navbar-bg: rgba(26, 26, 29, 0.85); /* Translucent glass effect */
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --accent-color: #6366f1; /* Indigo vibrant accent */
    --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    --search-bg: #27272a;
}

/* --- Navbar Core Layout --- */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 2rem;
    background-color: var(--navbar-bg);
    backdrop-filter: blur(12px); /* Blur effect for modern browsers */
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: 'Inter', sans-serif; /* Clean modern font */
}

/* --- Logo Section --- */
.nav-logo a {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: var(--text-main);
    font-weight: 700;
    font-size: 1.25rem;
    letter-spacing: -0.5px;
    transition: transform 0.2s ease;
}

.nav-logo a:hover {
    transform: scale(1.02);
}

.logo-img {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent-color);
}

/* --- Navigation Links --- */
.nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
    list-style: none;
    margin: 0;
    padding: 0;
}

.nav-links a {
    text-decoration: none;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.95rem;
    padding: 0.5rem 0rem;
    position: relative;
    transition: color 0.2s ease;
}

/* Hover & Active States with sliding underline */
.nav-links a:hover,
.nav-links a.active {
    color: var(--text-main);
}

.nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--accent-gradient);
    transition: width 0.3s ease;
    border-radius: 2px;
}

.nav-links a:hover::after,
.nav-links a.active::after {
    width: 100%;
}

/* --- Search Box --- */
.search-box {
    display: flex;
    align-items: center;
    background-color: var(--search-bg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50px; /* Capsule shape */
    padding: 0.25rem 0.25rem 0.25rem 1rem;
    transition: all 0.3s ease;
    width: 260px;
}

.search-box:focus-within {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
}

.search-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text-main);
    font-size: 0.875rem;
    width: 100%;
}

.search-input::placeholder {
    color: #6b7280;
}

.search-btn {
    background: var(--accent-gradient);
    border: none;
    color: white;
    padding: 0.5rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
}

.search-btn:hover {
    transform: scale(1.05);
}

/* --- Mobile Responsiveness (Quick Fix) --- */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
    }
    .nav-links {
        gap: 1.5rem;
    }
    .search-box {
        width: 100%;
    }
}

  
  </style>
  <body> 
<nav class="navbar">
    <!-- Logo Section -->
    <div class="nav-logo">
        <a href="/">
            <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img" alt="Logo">
            <span>Loveson BK</span>
        </a>
    </div>

    <!-- Navigation Links -->
    <ul class="nav-links">
        <li>
        <a href="/task" class="active">Home</a> </li>
       <li> <a href="/quiz" class="active">Quiz</a></li>
        <li><a href="/todo">ToDo</a></li>
        <li><a href="/attendance">Attendance</a></li>
        
    </ul>

    <!-- Search Box Section -->
    <div class="nav-search">
        <form action="/" method="GET" class="search-box">
            <input type="text" name="search" placeholder="Search tasks..." class="search-input">
            <button type="submit" class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </form>
    </div>
</nav>

<h1> LOVESON TASK PAGE </h1>

  

  </body>
  
  {% endblock body %}
