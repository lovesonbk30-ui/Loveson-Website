{% extends 'base.html' %}
{% block body %}
<style>
/* Center everything cleanly on the screen using Flexbox */
body {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #0f172a; /* Fallback background */
}

/* Main content wrapper to push footer down */
.content-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.box {
    max-width: 550px;
    width: 100%;
    margin: 40px auto; /* Reduced from 600px so it's visible */
    padding: 25px 30px;
    background: linear-gradient(135deg, #141e30, #243b55);
    border-radius: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,.35);
    animation: slideUp 1s ease;
}

.box::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,.12), transparent);
    transform: rotate(25deg);
    animation: shine 6s linear infinite;
}

.about {
    position: relative;
    z-index: 2;
    display: block;
    color: #fff;
    font-size: 3rem;
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 20px;
}

.about-btn {
    position: relative;
    z-index: 2;
    text-decoration: none;
    display: inline-block; /* Added for correct spacing */
    border: none;
    cursor: pointer;
    margin: 20px;
    padding: 14px 35px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #ff512f, #dd2476);
    box-shadow: 0 10px 25px rgba(221,36,118,.4);
    transition: .4s ease;
}

.about-btn:hover {
    background: #008891;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
}

/* Click feedback effect */
.about-btn:active {
  transform: translateY(-1px) scale(0.98);
    background-color: #4368ca; 
}

@keyframes shine{
    0%{
        transform:translateX(-100%) rotate(25deg);
    }
    100%{
        transform:translateX(100%) rotate(25deg);
    }
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
           


.desc {
    background: #181D62;
    text-align: center;
    width: 100%;
    padding: 15px 0; /* Replaced rigid 7vh with padding */
    color: #00E63D;
}

.info {
    font-size: 24px; /* Slightly reduced size to fit footer better */
    color: orange;
    margin: 0 0 5px 0;
    font-weight: bold;
}

.me {
    font-size: 24px;
    color: red;
    font-weight: bold;
}

.head {
    background: green;
    padding: 10px 20px; /* Responsive instead of explicit vh */
    margin: 20px auto;
    text-align: center;
    border-radius: 8px;
    border: 3px solid blue;
}

h1 {
    font-size: 4.5rem; /* Scaled down so it fits smaller screens */
    margin: 0;
    color: darkorange;
    font-family: 'Times New Roman', Times, serif;
}
.greet{
margin: 30px;
font-weight: bold;
font-size: 5rem;
color: red;
border: 3px solid pink;
}
</style>
<span class='greet'> 🔆WELCOME! </span>
<div class="content-wrapper">
    <div class='head'>
        <h1>💠 LOVESON QUIZ</h1>
    </div>

    <div class="box">
        <span class="about">
            线QUIZ TIME
        </span>
        <a href='https://canva.link/tftjri95ejdoers' class='about-btn'>▶Start</a> 
    </div>
</div>

<footer class='desc'>
    <p class='info'>Designed By: <span class='me'>Loveson B.K.</span></p> 
    &copy; Loveson Quiz site is a friendly site and copying is not allowed.
</footer>
{% endblock body %}
