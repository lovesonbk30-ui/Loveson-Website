{% extends 'base.html' %}
{% block body %}
<style>
    /* Premium Font Import */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    body {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: radial-gradient(circle at 50% 0%, #1e1b4b, #0f172a 70%); 
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #f8fafc;
        overflow-x: hidden;
    }

    .content-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        width: 100%;
        max-width: 600px;
        box-sizing: border-box;
    }

    /* Welcome Badge */
    .greet {
        margin-top: 40px;
        font-weight: 800;
        font-size: 0.9rem;
        color: #38bdf8;
        background: rgba(56, 189, 248, 0.1);
        padding: 8px 20px;
        border-radius: 100px;
        border: 1px solid rgba(56, 189, 248, 0.2);
        letter-spacing: 2px;
        text-transform: uppercase;
        backdrop-filter: blur(8px);
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        animation: fadeInDown 0.8s ease;
    }

    /* Header Styling */
    .head {
        margin: 30px 0 10px 0;
        text-align: center;
        animation: fadeIn 1s ease;
    }

    h1 {
        font-size: 3rem; 
        font-weight: 800;
        margin: 0;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
    }

    /* Main Box Container */
    .box {
        width: 100%;
        margin: 20px 0; 
        padding: 40px 30px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .box::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
        transform: rotate(25deg);
        animation: shine 8s linear infinite;
    }

    .about {
        position: relative;
        z-index: 2;
        display: block;
        color: #fff;
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 35px;
    }

    /* Clean, Modern Action Buttons */
    .about-btn {
        position: relative;
        z-index: 2;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 10px;
        padding: 16px 40px;
        border-radius: 14px;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dynamic Second Button Style */
    .about-btn-alt {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: none;
    }

    .about-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(6, 182, 212, 0.4);
        filter: brightness(1.1);
    }

    .about-btn-alt:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .about-btn:active {
        transform: translateY(-1px);
    }

    /* Beautiful Footer */
    .desc {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255, 255, 256, 0.05);
        text-align: center;
        width: 100%;
        padding: 25px 0; 
        color: #94a3b8;
        
        font-size: 0.9rem;
    }

    .info {
        font-size: 1.1rem; 
        color: #f8fafc;
        margin: 0 0 8px 0;
        font-weight: 600;
    }

    .me {
        background: linear-gradient(135deg, #fb923c, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
    }

    /* Keyframe Animations */
    @keyframes shine {
        0% { transform: translateX(-100%) rotate(25deg); }
        100% { transform: translateX(100%) rotate(25deg); }
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

<span class='greet'>🔆 Welcome to the Hub</span>

<div class="content-wrapper">
    <div class='head'>
        <h1>💠 LOVESON QUIZ</h1>
    </div>

    <div class="box">
        <span class="about">💥 QUIZ TIME</span>
        <a href='https://lovesonbk.my.canva.site' class='about-btn'>▶ Start Quiz</a> 
        <a href='/fun' class='about-btn about-btn-alt'>📄Learn More</a> 
    </div>
</div>

<footer class='desc'>
    <p class='info'>Designed By: <span class='me'>Loveson B.K.</span></p> 
    &copy; Loveson Quiz site. All rights reserved. Friendly Quiz space.
</footer>
{% endblock body %}
