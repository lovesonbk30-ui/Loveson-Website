{% extends 'Base.html' %}

        /* 1. Global Reset & Body Setup */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background-color: #f4f4f9;
}

/* 2. Navbar Container Styling */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #1a1a2e;
  padding: 15px 40px;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

/* 3. Logo Component */
.nav-logo a {
  color: #ffffff;
  font-size: 24px;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 1px;
}

/* 4. Navigation Links Layout */
.nav-links {
  list-style: none;
  display: flex;
  gap: 30px;
}

.nav-links a {
  color: #e0e0e0;
  text-decoration: none;
  font-size: 20px;
  font-weight: 500;
  transition: color 0.3s ease;
}

/* 3. Logo Component */
.nav-logo a {
  color: #ffffff;
  font-size: 24px;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 1px;
}

/* 4. Navigation Links Layout */
.nav-links {
  list-style: none;
  display: flex;
  gap: 30px;
}

.nav-links a {
  color: #e0e0e0;
  text-decoration: none;
  font-size: 20px;
  font-weight: 500;
  transition: color 0.3s ease;
}

/* Hover & Active States */
.nav-links a:hover,
.nav-links a.active {
  color: #00adb5;
}

/* 5. Call To Action Button */
.btn {
  background-color: #00adb5;
  color: #ffffff;
  padding: 9px 20px;
  border-radius: 5px;
  text-decoration: none;
  font-weight: 600;
  transition: background-color 0.3s ease, transform 0.2s ease;
}

.btn:hover {
  background-color: #007a80;
  transform: translateY(-1px);
}

/* 6. Responsive Adjustments for Smaller Screens */
@media screen and (max-width: 768px) {
  .navbar {
    padding: 15px 20px;
  }
  
  .nav-links {
    gap: 15px;
  }

  .nav-links a {
    font-size: 20px;
  }

  .btn {
    padding: 7px 15px;
    font-size: 14px;
  }
}
.todo-table {
    width: 90%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
}

.todo-table th,
.todo-table td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
}

.todo-table th {
    background-color: #00adb5;
    color: white;
}

.todo-table tr:nth-child(even) {
    background-color: #f2f2f2;
}

.todo-table tr:hover {
    background-color: #ddd;
}
.todo-card{
    max-width:500px;
    margin:30px auto;
    background:#ffffff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.todo-card h2{
    text-align:center;
    color:#1a1a2e;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    transition:0.3s;
}

.input-group input:focus,
.input-group textarea:focus{
    border-color:#00adb5;
    outline:none;
    box-shadow:0 0 10px rgba(0,173,181,0.3);
}

.submit-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00adb5;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#008891;
    transform:translateY(-2px);
}

.submit-btn:active{
    transform:scale(0.98);
}
.logo-img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #00adb5;
    transition:all .5s ease;
    box-shadow:0 0 15px rgba(0,173,181,.5);
}

.logo-img:hover{
    transform:rotate(360deg) scale(1.15);
}

.nav-logo a{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
}

.nav-logo span{
    color:white;
    font-size:24px;
    font-weight:700;
    letter-spacing:1px;
}
  
  .creator-btn {
    background: linear-gradient(135deg, #ff0055, #7f00ff);
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .creator-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .creator-count {
    background: rgba(255, 255, 255, 0.2);
    padding: 3px 10px;
    border-radius: 15px;
    font-size: 14px;
  }
.notify-btn{
    width:70%;
    padding:14px;
    border:none;
    border-radius:10px;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    background-color: #F34825;

}
.search-box form{
    display:flex;
    align-items:center;
    gap:10px;
}

.search-input{
    width:100px;
    padding:10px 15px;
    border:none;
    border-radius:30px;
    outline:none;
    font-size:15px;
    background:white;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
    transition:0.3s;
}

.search-input:focus{
    width:320px;
    box-shadow:0 0 15px rgba(0,173,181,.5);
}

.search-btn{
    padding:10px 18px;
    border:none;
    border-radius:30px;
    background:#00adb5;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.search-btn:hover{
    background:#008891;
}
    </style>
</head>
<body>


<nav class="navbar">

    <div class="nav-logo">
        <a href="/">
            <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo-img" alt="Logo">
            <span>Loveson BK</span>
        </a>
    </div>

    <ul class="nav-links">
        <li><a href="/" class="active">Home</a></li>
        <li><a href="#todo">Tasks</a></li>
        <li><a href="#"> Services</a></li>
        <li><a href="#"> Contact</a></li>
    </ul>

    <div class="nav-button">
 <div class="search-box">
    <form action="/" method="GET">
        <input
            type="text"
            name="search"
            placeholder="🔍 Search tasks..."
            class="search-input">

        <button type="submit" class="search-btn">
            Search
        </button>
    </form>
</div>
    </form>
  </div>
</nav>
    </div>

</nav>



<div class="todo-card">
    <h2>📝 Update ToDo </h2>

    <form action ='/update/{{todo.Sn}}' method="POST">

        <div class="input-group">
            <label for="title">📌 Task Title</label>
            <input
                type="text"
                id="title"
                name="title"
                value={{todo.title}}
                placeholder="Enter your task..."
                required>
        </div>

        <div class="input-group">
            <label for="desc">📖 Description</label>
            <textarea
                id="desc"
                type='text'
                name="desc"
                rows="4"
             
                placeholder="Write task details..."
                required>   {{todo.desc}}</textarea>
        </div>

        <button type="submit" class="submit-btn">
            ⬆️ Update Task
        </button>

    </form>
  

</div>

    <tbody>
    {% for Loveson in all_todo %}
    <tr>
      <th scope="row">{{loop.index}}</th>
      <td>{{Loveson.title}}</td>
      <td>{{Loveson.desc}}</td>
      <td>{{Loveson.date_created}}</td>
      <td> <a href='/update/{{Loveson.Sn}}' type="button" class="btn btn-outline-dark btn-sm mx-2"> Update </button>
      <a href='/delete/{{Loveson.Sn}}' type="button" class="btn btn-outline-dark btn-sm mx-2"> Delete </button> </td>
    </tr>
       {% endfor %}
    
    </tbody>
</table>
  {% endblock body %}
